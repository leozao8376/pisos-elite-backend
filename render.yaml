services:
  - type: web
    name: pisoselite-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    plan: free